<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Game.css">
    <title>Rock Paper Game</title>
</head>
<body>

    <div class="container">

        <h1 class="apptitle">Rock Paper Scissors Game</h1>

        <div class="weapons-box">
            <h2>SELECT YOUR WEAPONS</h2>

            <div class="weapons">
                <div class="Rock">
                    <img src="image/Rock.png" alt="">
                </div>

                <div class="Paper">
                    <img src="image/Paper.png" alt="">
                </div>

                <div class="Scissors">
                    <img src="image/Scissors.png" alt="">
                </div>
            </div>
        </div>

        <div class="player-choices">
            <h3>Player <span>vs</span> Computer</h3>

            <div class="player-choice">
                <img src="image/Rock.png" alt="">
            </div>

            <div class="computer-choice">
                <img src="image/Rock.png" alt="">
            </div>
        </div>

        <div class="result-box">
            <h3>congrats , you won &#x1F389;</h3>
            <button class="play-again">&#x21BB; Play Again</button>
        </div>

        <div class="score-box">
            <div class="won">
                <h3>Won : <span>0</span></h3>
            </div>

            <div class="lost">
                <h3>Lost : <span>0</span></h3>
            </div>

            <div class="draw">
                <h3>Draw : <span>0</span></h3>
            </div>
        </div>

    </div>

    <script src="Game.js"></script>

</body>
</html>
